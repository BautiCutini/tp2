<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Registro</title>
    <meta name="description" content="Cine Aurora - Registro" />
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel = "stylesheet" href = "../css/components/registro.css"  />
  </head>
  <body id="page-registro">

    <header id="main-header">
      <div class ="header-brand">
        <h1 class="header-title">Cine Aurora</h1>"
        <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" class="header-logo" />
      </div>
      <div class = "header-nav">
        <nav class="nav-links">
          <a href="../index.html" class="nav-link">Inicio</a>
          <a href="./estrenos.html" class="nav-link">Próximos estrenos</a>
          <a href="../index.html" class="nav-link">Volver</a>
        </nav>
      </div>
    </header>


    <main id="main-content">
      <div class="registro-container">
        <form class="registro-form" action="login.html">
          <h2 class="form-title">Crear nueva cuenta</h2>

          <div class="form-grid">
            <div class="form-group span-full">
              <label for="nombre-completo">Nombre Completo</label>
              <input type="text" id="nombre-completo" class="form-input" required />
            </div>

            <div class="form-group span-full">
              <label for="email">Email</label>
              <input type="email" id="email" class="form-input" required />
            </div>

            <div class="form-group span-full">
              <label for="fecha-nacimiento">Fecha de nacimiento</label>
              <input type="date" id="fecha-nacimiento" class="form-input" required />
            </div>

            <div class="form-group span-full">
              <label for="contrasena" >Contraseña</label>
              <input type="password" id="contrasena" class="form-input" required />
            </div>

            <div class="form-group span-full">
              <label for="confirmar-contrasena" >Confirmar contraseña</label>
              <input type="password" id="confirmar-contrasena" class="form-input" required />
            </div>

          </div>

          <hr class="form-divider" /> 

           <div class="seccion-extra">
            <div class="seccion-extra-header">
              <h3>Datos para ayudar al cine</h3>
              <p>Estos datos nos ayudan a mejorar tu experiencia.</p>
            </div>
            <div class="seccion-extra-campos">
              <div class="form-group">
                <label for="color-butaca">Elegí tu color favorito para las butacas</label>
                <input type="color" id="color-butaca" />
              </div>
              <div class="form-group">
                <label for="cantidad-entradas">¿Cuántas entradas comprás en general? Min: 0 | Max: 10</label>
                <input type="range" id="cantidad-entradas" min="0" max="10" />
              </div>
              <div class="form-group">
                <label for="genero-favorito">Seleccioná tu género favorito</label>
                <select id="genero-favorito">
                  <option>Acción</option>
                  <option>Drama</option>
                  <option>Ciencia ficción</option>
                  <option>Terror</option>
                  <option>Comedia</option>
                  <option>Romance</option>
                </select>
              </div>
              <div class="form-group">
                <label>Elegí tu snack favorito</label>
                <div class="radio-group">
                  <input type="radio" name="snack" id="snack-dulce" />
                  <label for="snack-dulce">Pochoclo dulce</label>
                  <input type="radio" name="snack" id="snack-salado" />
                  <label for="snack-salado">Pochoclo salado</label>
                  <input type="radio" name="snack" id="snack-chocolate" />
                  <label for="snack-chocolate">Chocolate</label>
                  <input type="radio" name="snack" id="snack-frutos" />
                  <label for="snack-frutos">Frutos secos</label>
                </div>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-submit">Regístrate</button>
          </div>
        </form>
      </div>

      <footer id="main-footer">
        <p>&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
      </footer>
    </main>

  </body>
</html>
